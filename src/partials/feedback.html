<section class="feedback-section" id="feedback-reviews">
  <div class="container feedback-section-container">
    <h2 class="title-feedback">Відгуки клієнтів</h2>
    <p class="feedback-paragraph">
      Найкращі десерти, які я коли-небудь куштував!
    </p>
    <div class="reviews-slider-wrapper">
      <div class="reviews-swiper-box">
        <div class="swiper reviews-swiper">
          <div class="swiper-wrapper"></div>
        </div>
        <div class="reviews-controls">
          <div class="swiper-pagination"></div>

          <div class="reviews-buttons">
            <button class="reviews-next" type="button">
              <svg class="svg-arrow" width="24" height="24">
                <use xlink:href="/img/sprite.svg#icon-arrow_back"></use>
              </svg>
            </button>
            <button class="reviews-prev" type="button">
              <svg class="svg-arrow" width="24" height="24">
                <use xlink:href="/img/sprite.svg#icon-arrow_forward"></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
